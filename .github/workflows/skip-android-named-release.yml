name: Skip Android Named Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag to create, for example skip-android-v0.3.0"
        required: true
        type: string
      release_name:
        description: "Human-readable release name"
        required: true
        type: string
      app_version:
        description: "Android app versionName/version used by Skip"
        required: true
        default: "0.3.1"
        type: string
      confirm_visual_parity:
        description: "Type visual-parity-passed after iOS/Android screenshot goldens pass"
        required: true
        type: string
      confirm_live_networking:
        description: "Type live-networking-passed after real server auth/session/chat smoke passes"
        required: true
        type: string
      prerelease:
        description: "Publish as a prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: skip-android-named-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-guard:
    name: Release Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Require visual and live-networking confirmations
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm_visual_parity }}" != "visual-parity-passed" ]; then
            echo "Refusing to publish: run and pass the iOS/Android visual-golden screenshot diff first."
            exit 1
          fi
          if [ "${{ inputs.confirm_live_networking }}" != "live-networking-passed" ]; then
            echo "Refusing to publish: smoke test real server auth, session loading, chat send/stream, and reconnect first."
            exit 1
          fi
          python3 ci/skip_release_readiness_audit.py

  skip-android-release:
    name: Build And Release Skip Android App
    runs-on: macos-26
    timeout-minutes: 90
    needs: release-guard
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Install Skip
        run: |
          set -euo pipefail
          brew tap skiptools/skip || true
          brew trust skiptools/skip
          brew install skiptools/skip/skip || brew upgrade skiptools/skip/skip

      - name: Install Android SDK for Skip
        run: |
          set -euo pipefail
          brew tap aws/tap || true
          brew trust aws/tap || true
          if ! skip android sdk install; then
            cat /tmp/skip-install-*.txt 2>/dev/null || true
            exit 1
          fi

      - name: Build shared Swift package
        run: |
          set -euo pipefail
          export SKIP_ZERO=1
          swift build
          swift test

      - name: Export runnable Skip Android app
        env:
          HERMEX_SKIP_VERSION: ${{ inputs.app_version }}
        run: |
          set -euo pipefail
          bash ci/build_skip_android_app.sh "$RUNNER_TEMP/hermex-skip-dist"

      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p dist
          find "$RUNNER_TEMP/hermex-skip-dist" -type f \( -name '*.apk' -o -name '*.aab' \) -print0 |
            while IFS= read -r -d '' asset; do
              ext="${asset##*.}"
              cp "$asset" "dist/hermex-skip-android-${{ inputs.app_version }}.${ext}"
            done
          shasum -a 256 dist/* > dist/SHA256SUMS.txt
          ls -la dist

      - name: Create release notes
        run: |
          set -euo pipefail
          cat > release-notes.md <<'EOF'
          Hermex Skip Android release.

          This release contains an Android artifact built from a generated Skip transpiled-app shell that launches the shared SwiftUI `HermexStoreRootScreen`.

          This build is allowed to publish only after the live networking smoke test and iOS/Android visual-golden screenshot diff have passed.

          Build gates:
          - shared Swift package build and tests with `SKIP_ZERO=1`
          - Skip release readiness audit
          - generated Skip app shell build through `skipstone`
          - generated Skip Android Gradle `assembleDebug`
          - manual confirmation of real-server auth/session/chat networking
          - manual confirmation of visual-golden parity

          The APK is debug-signed for direct installation and smoke testing.
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE_FLAG: ${{ inputs.prerelease && '--prerelease' || '' }}
        run: |
          set -euo pipefail
          release_assets=()
          while IFS= read -r asset; do
            release_assets+=("$asset")
          done < <(find dist -type f | sort)
          if [ "${#release_assets[@]}" -eq 0 ]; then
            echo "No release assets found in dist"
            exit 1
          fi
          gh release create "${{ inputs.tag_name }}" "${release_assets[@]}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "${{ inputs.release_name }}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG
