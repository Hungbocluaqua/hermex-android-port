name: Android Visual Screens

on:
  workflow_dispatch:
    inputs:
      screen:
        description: "Visual fixture screen name from ci/visual-goldens/hermex-screens.json"
        required: true
        default: "session-list"
        type: string
      state:
        description: "System appearance"
        required: true
        default: "dark"
        type: choice
        options:
          - dark
          - light
      device_name:
        description: "Device key from ci/visual-goldens/hermex-screens.json"
        required: true
        default: "compact-phone"
        type: choice
        options:
          - compact-phone
          - large-phone
      artifact_name:
        description: "Artifact name for the captured Android screenshot"
        required: true
        default: "hermex-android-visual-screen"
        type: string
      apk_run_id:
        description: "Optional GitHub Actions run id containing a prebuilt Skip visual APK artifact"
        required: false
        default: ""
        type: string
      apk_artifact_name:
        description: "Artifact name for the prebuilt Skip visual APK"
        required: false
        default: "hermex-skip-visual-apk"
        type: string
  workflow_run:
    workflows:
      - Skip Android Visual APK Build
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  capture:
    name: Capture Android Fixture Screenshot
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master') }}
    runs-on: ${{ fromJSON(vars.HERMEX_MACOS_VISUAL_RUNNER || '"macos-26-intel"') }}
    timeout-minutes: 120
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
      HERMEX_ALLOW_INCOMPLETE_SKIP_APK: "1"
      VISUAL_SCREEN: ${{ github.event_name == 'workflow_run' && 'session-list' || inputs.screen }}
      VISUAL_STATE: ${{ github.event_name == 'workflow_run' && 'dark' || inputs.state }}
      VISUAL_DEVICE_NAME: ${{ github.event_name == 'workflow_run' && 'compact-phone' || inputs.device_name }}
      VISUAL_ARTIFACT_NAME: ${{ github.event_name == 'workflow_run' && 'hermex-android-visual-smoke' || inputs.artifact_name }}
      VISUAL_APK_RUN_ID: ${{ github.event_name == 'workflow_run' && format('{0}', github.event.workflow_run.id) || inputs.apk_run_id }}
      VISUAL_APK_ARTIFACT_NAME: ${{ github.event_name == 'workflow_run' && 'hermex-skip-visual-apk' || inputs.apk_artifact_name }}
      HERMEX_ANDROID_SDK_ROOT_OVERRIDE: ${{ vars.HERMEX_ANDROID_SDK_ROOT }}
      HERMEX_VISUAL_EMULATOR_AVD: ${{ vars.HERMEX_VISUAL_EMULATOR_AVD || 'hermex-visual' }}
      HERMEX_VISUAL_REUSE_CONNECTED_EMULATOR: ${{ vars.HERMEX_VISUAL_REUSE_CONNECTED_EMULATOR || '0' }}
      HERMEX_VISUAL_EMULATOR_SNAPSHOT: ${{ vars.HERMEX_VISUAL_EMULATOR_SNAPSHOT || '0' }}
      HERMEX_VISUAL_EMULATOR_WIPE_DATA: ${{ vars.HERMEX_VISUAL_EMULATOR_WIPE_DATA || '1' }}
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: SwiftPM cache
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apk_run_id == '' }}
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-${{ runner.arch }}-swiftpm-visual-${{ hashFiles('Package.swift', 'Package.resolved', 'Sources/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-swiftpm-visual-
            ${{ runner.os }}-${{ runner.arch }}-swiftpm-

      - name: Gradle cache
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apk_run_id == '' }}
        uses: gradle/actions/setup-gradle@v5

      - name: Android SDK cache
        if: ${{ vars.HERMEX_VISUAL_PREINSTALLED_ANDROID != '1' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Android/sdk/cmdline-tools
            ~/Library/Android/sdk/emulator
            ~/Library/Android/sdk/platform-tools
            ~/Library/Android/sdk/platforms
            ~/Library/Android/sdk/system-images
            ~/.android/cache
          key: ${{ runner.os }}-${{ runner.arch }}-android-sdk-35-visual-v3

      - name: Configure Android SDK paths
        run: |
          set -euo pipefail
          sdk="${HERMEX_ANDROID_SDK_ROOT_OVERRIDE:-$HOME/Library/Android/sdk}"
          echo "ANDROID_HOME=$sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$sdk" >> "$GITHUB_ENV"
          echo "$sdk/platform-tools" >> "$GITHUB_PATH"
          echo "$sdk/emulator" >> "$GITHUB_PATH"
          echo "$sdk/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Install Skip
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apk_run_id == '' }}
        run: |
          set -euo pipefail
          brew tap skiptools/skip || true
          brew trust skiptools/skip
          install_skip() {
            brew install skiptools/skip/skip || brew upgrade skiptools/skip/skip
          }
          for attempt in 1 2 3; do
            if install_skip; then
              exit 0
            fi
            echo "Skip install attempt $attempt failed; retrying after a short delay."
            sleep $((attempt * 20))
          done
          install_skip

      - name: Install Android SDK for Skip
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apk_run_id == '' }}
        run: |
          set -euo pipefail
          skip android sdk install
          echo "ANDROID_HOME=$HOME/Library/Android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$HOME/Library/Android/sdk" >> "$GITHUB_ENV"
          export ANDROID_HOME="$HOME/Library/Android/sdk"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/emulator" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Ensure Android SDK for visual capture
        if: ${{ github.event_name == 'workflow_run' || inputs.apk_run_id != '' }}
        run: |
          set -euo pipefail
          if command -v sdkmanager >/dev/null 2>&1; then
            exit 0
          fi
          echo "Android SDK command-line tools were not restored from cache; installing Skip fallback."
          brew tap skiptools/skip || true
          brew trust skiptools/skip
          brew install skiptools/skip/skip || brew upgrade skiptools/skip/skip
          skip android sdk install

      - name: Validate capture script
        run: |
          set -euo pipefail
          bash ci/capture_skip_android_fixture.sh \
            --self-test \
            --screen "$VISUAL_SCREEN" \
            --state "$VISUAL_STATE" \
            --device-name "$VISUAL_DEVICE_NAME"

      - name: Create Android emulator
        if: ${{ vars.HERMEX_VISUAL_REUSE_CONNECTED_EMULATOR != '1' }}
        run: |
          set -euo pipefail
          avd_name="$HERMEX_VISUAL_EMULATOR_AVD"
          if avdmanager list avd | grep -E "Name: +$avd_name$" >/dev/null; then
            echo "Reusing existing Android AVD: $avd_name"
            avd_config="$HOME/.android/avd/$avd_name.avd/config.ini"
            if [[ -f "$avd_config" ]]; then
              {
                echo "hw.keyboard=no"
                echo "hw.keyboard.lid=no"
              } >> "$avd_config"
            fi
            exit 0
          fi
          sdkmanager --install "platform-tools" "emulator" "platforms;android-35"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null || true
          set -o pipefail
          if [[ "$(uname -m)" == "arm64" ]]; then
            arch="arm64-v8a"
          else
            arch="x86_64"
          fi
          install_system_image() {
            local image="$1"
            set +o pipefail
            yes | sdkmanager --install "$image"
            local status=$?
            set -o pipefail
            return "$status"
          }
          system_image=""
          for candidate in \
            "system-images;android-35;default;$arch" \
            "system-images;android-35;google_apis;$arch"; do
            if install_system_image "$candidate"; then
              system_image="$candidate"
              break
            fi
            echo "Android system image unavailable, trying next candidate: $candidate"
          done
          if [[ -z "$system_image" ]]; then
            echo "No Android system image candidate could be installed." >&2
            exit 1
          fi
          sdkmanager --install "$system_image"
          echo "Using Android system image: $system_image"
          echo "no" | avdmanager create avd \
            --force \
            --name "$avd_name" \
            --package "$system_image" \
            --device pixel_7
          avd_config="$HOME/.android/avd/$avd_name.avd/config.ini"
          {
            echo "hw.keyboard=no"
            echo "hw.keyboard.lid=no"
          } >> "$avd_config"

      - name: Start Android emulator in background
        if: ${{ vars.HERMEX_VISUAL_REUSE_CONNECTED_EMULATOR != '1' }}
        run: |
          set -euo pipefail
          adb start-server
          emulator_args=(
            -avd "$HERMEX_VISUAL_EMULATOR_AVD"
            -no-window \
            -gpu swiftshader_indirect \
            -noaudio \
            -no-boot-anim \
            -no-metrics \
            -camera-back none \
            -camera-front none
          )
          if [[ "${HERMEX_VISUAL_EMULATOR_SNAPSHOT:-0}" != "1" ]]; then
            emulator_args+=(-no-snapshot)
          fi
          if [[ "${HERMEX_VISUAL_EMULATOR_WIPE_DATA:-1}" == "1" ]]; then
            emulator_args+=(-wipe-data)
          fi
          nohup emulator "${emulator_args[@]}" \
            > "$RUNNER_TEMP/hermex-visual-emulator.log" 2>&1 &
          connected=""
          for _ in {1..120}; do
            if adb devices | awk 'NR > 1 && $2 == "device" { found = 1 } END { exit found ? 0 : 1 }'; then
              connected="1"
              break
            fi
            if ! pgrep -f "emulator.*$HERMEX_VISUAL_EMULATOR_AVD" >/dev/null; then
              cat "$RUNNER_TEMP/hermex-visual-emulator.log" || true
              echo "Android emulator process exited before adb could connect." >&2
              exit 1
            fi
            sleep 2
          done
          if [[ "$connected" != "1" ]]; then
            cat "$RUNNER_TEMP/hermex-visual-emulator.log" || true
            echo "Android emulator did not appear in adb devices." >&2
            exit 1
          fi
          echo "Android emulator is registered with adb; boot continues during the APK build."

      - name: Download reusable Skip APK
        if: ${{ github.event_name == 'workflow_run' || inputs.apk_run_id != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/hermex-skip-visual-apk"
          gh run download "$VISUAL_APK_RUN_ID" \
            --repo "${{ github.repository }}" \
            --name "$VISUAL_APK_ARTIFACT_NAME" \
            --dir "$RUNNER_TEMP/hermex-skip-visual-apk"
          apk_count="$(find "$RUNNER_TEMP/hermex-skip-visual-apk" -type f -name '*.apk' | wc -l | tr -d ' ')"
          if [[ "$apk_count" -lt 1 ]]; then
            echo "Downloaded artifact did not contain an APK." >&2
            find "$RUNNER_TEMP/hermex-skip-visual-apk" -maxdepth 3 -type f -print >&2
            exit 1
          fi
          echo "Downloaded $apk_count reusable Skip APK artifact file(s)."

      - name: Build reusable Skip APK
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apk_run_id == '' }}
        timeout-minutes: 35
        run: |
          set -euo pipefail
          export HERMEX_ALLOW_INCOMPLETE_SKIP_APK=1
          export HERMEX_ENABLE_RUNTIME_VISUAL_FIXTURES=1
          unset HERMEX_VISUAL_FIXTURE_NAME
          bash ci/build_skip_android_app.sh "$RUNNER_TEMP/hermex-skip-visual-apk"

      - name: Wait for Android emulator boot
        run: |
          set -euo pipefail
          adb wait-for-device
          booted=""
          for _ in {1..180}; do
            booted="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')"
            if [[ "$booted" == "1" ]]; then
              echo "Android emulator boot completed."
              exit 0
            fi
            sleep 5
          done
          cat "$RUNNER_TEMP/hermex-visual-emulator.log" || true
          echo "Android emulator did not finish booting." >&2
          exit 1

      - name: Prepare Android emulator for visual capture
        run: |
          set -euo pipefail
          adb wait-for-device
          adb shell settings put global device_provisioned 1 >/dev/null 2>&1 || true
          adb shell settings put global setup_wizard_has_run 1 >/dev/null 2>&1 || true
          adb shell settings put secure user_setup_complete 1 >/dev/null 2>&1 || true
          adb shell settings put secure lockscreen.disabled 1 >/dev/null 2>&1 || true
          adb shell settings put secure lock_screen_locking_enabled 0 >/dev/null 2>&1 || true
          adb shell settings put secure screensaver_enabled 0 >/dev/null 2>&1 || true
          adb shell settings put secure screensaver_activate_on_sleep 0 >/dev/null 2>&1 || true
          adb shell settings put secure screensaver_activate_on_dock 0 >/dev/null 2>&1 || true
          adb shell settings put secure doze_enabled 0 >/dev/null 2>&1 || true
          adb shell settings put system screen_off_timeout 2147483647 >/dev/null 2>&1 || true
          adb shell svc power stayon true >/dev/null 2>&1 || true
          adb shell pm disable-user --user 0 com.google.android.setupwizard >/dev/null 2>&1 || true
          adb shell am force-stop com.google.android.setupwizard >/dev/null 2>&1 || true
          adb shell pm disable-user --user 0 com.google.android.googlesdksetup >/dev/null 2>&1 || true
          adb shell am force-stop com.google.android.googlesdksetup >/dev/null 2>&1 || true
          adb shell input keyevent KEYCODE_WAKEUP >/dev/null 2>&1 || true
          adb shell input keyevent 224 >/dev/null 2>&1 || true
          adb shell wm dismiss-keyguard >/dev/null 2>&1 || true

      - name: Capture Android screenshot
        timeout-minutes: 15
        run: |
          set -euo pipefail
          bash ci/capture_skip_android_fixture.sh \
            --screen "$VISUAL_SCREEN" \
            --state "$VISUAL_STATE" \
            --device-name "$VISUAL_DEVICE_NAME" \
            --output-root "$RUNNER_TEMP/android-visual-screens" \
            --apk-dir "$RUNNER_TEMP/hermex-skip-visual-apk" \
            --reuse-apk

      - name: Upload Android screenshot artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.VISUAL_ARTIFACT_NAME }}
          if-no-files-found: error
          path: ${{ runner.temp }}/android-visual-screens/**

      - name: Upload Android visual diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: hermex-android-visual-failure-diagnostics
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/hermex-visual-emulator.log
            ${{ runner.temp }}/android-visual-debug/**
            ${{ runner.temp }}/android-visual-screens/**
