name: Android Visual Screens

on:
  workflow_dispatch:
    inputs:
      screen:
        description: "Visual fixture screen name from ci/visual-goldens/hermex-screens.json"
        required: true
        default: "session-list"
        type: string
      state:
        description: "System appearance"
        required: true
        default: "dark"
        type: choice
        options:
          - dark
          - light
      device_name:
        description: "Device key from ci/visual-goldens/hermex-screens.json"
        required: true
        default: "compact-phone"
        type: choice
        options:
          - compact-phone
          - large-phone
      artifact_name:
        description: "Artifact name for the captured Android screenshot"
        required: true
        default: "hermex-android-visual-screen"
        type: string

permissions:
  contents: read

jobs:
  capture:
    name: Capture Android Fixture Screenshot
    runs-on: macos-26-intel
    timeout-minutes: 120
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
      HERMEX_ALLOW_INCOMPLETE_SKIP_APK: "1"
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Skip
        run: |
          set -euo pipefail
          brew tap skiptools/skip || true
          brew trust skiptools/skip
          install_skip() {
            brew install skiptools/skip/skip || brew upgrade skiptools/skip/skip
          }
          for attempt in 1 2 3; do
            if install_skip; then
              exit 0
            fi
            echo "Skip install attempt $attempt failed; retrying after a short delay."
            sleep $((attempt * 20))
          done
          install_skip

      - name: Install Android SDK for Skip
        run: |
          set -euo pipefail
          skip android sdk install
          echo "ANDROID_HOME=$HOME/Library/Android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$HOME/Library/Android/sdk" >> "$GITHUB_ENV"
          export ANDROID_HOME="$HOME/Library/Android/sdk"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/emulator" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Validate capture script
        run: |
          set -euo pipefail
          bash ci/capture_skip_android_fixture.sh \
            --self-test \
            --screen "${{ inputs.screen }}" \
            --state "${{ inputs.state }}" \
            --device-name "${{ inputs.device_name }}"

      - name: Create Android emulator
        run: |
          set -euo pipefail
          sdkmanager --install "platform-tools" "emulator" "platforms;android-35"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null || true
          set -o pipefail
          if [[ "$(uname -m)" == "arm64" ]]; then
            system_image="system-images;android-35;google_apis;arm64-v8a"
          else
            system_image="system-images;android-35;google_apis;x86_64"
          fi
          set +o pipefail
          yes | sdkmanager --install "$system_image"
          set -o pipefail
          sdkmanager --install "$system_image"
          echo "no" | avdmanager create avd \
            --force \
            --name hermex-visual \
            --package "$system_image" \
            --device pixel_7

      - name: Start Android emulator
        run: |
          set -euo pipefail
          adb start-server
          nohup emulator \
            -avd hermex-visual \
            -no-window \
            -gpu swiftshader_indirect \
            -noaudio \
            -no-boot-anim \
            -no-snapshot \
            -no-metrics \
            -wipe-data \
            -camera-back none \
            -camera-front none \
            > "$RUNNER_TEMP/hermex-visual-emulator.log" 2>&1 &
          connected=""
          for _ in {1..120}; do
            if adb devices | awk 'NR > 1 && $2 == "device" { found = 1 } END { exit found ? 0 : 1 }'; then
              connected="1"
              break
            fi
            if ! pgrep -f "emulator.*hermex-visual" >/dev/null; then
              cat "$RUNNER_TEMP/hermex-visual-emulator.log" || true
              echo "Android emulator process exited before adb could connect." >&2
              exit 1
            fi
            sleep 2
          done
          if [[ "$connected" != "1" ]]; then
            cat "$RUNNER_TEMP/hermex-visual-emulator.log" || true
            echo "Android emulator did not appear in adb devices." >&2
            exit 1
          fi
          booted=""
          for _ in {1..60}; do
            booted="$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')"
            if [[ "$booted" == "1" ]]; then
              exit 0
            fi
            sleep 5
          done
          cat "$RUNNER_TEMP/hermex-visual-emulator.log" || true
          echo "Android emulator did not finish booting." >&2
          exit 1

      - name: Capture Android screenshot
        run: |
          set -euo pipefail
          bash ci/capture_skip_android_fixture.sh \
            --screen "${{ inputs.screen }}" \
            --state "${{ inputs.state }}" \
            --device-name "${{ inputs.device_name }}" \
            --output-root "$RUNNER_TEMP/android-visual-screens" \
            --apk-dir "$RUNNER_TEMP/hermex-skip-visual-apk"

      - name: Upload Android screenshot artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.artifact_name }}
          if-no-files-found: error
          path: ${{ runner.temp }}/android-visual-screens/**

      - name: Upload emulator log on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: hermex-android-visual-emulator-log
          if-no-files-found: ignore
          path: ${{ runner.temp }}/hermex-visual-emulator.log
