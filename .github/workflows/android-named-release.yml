name: Android Named Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag to create, for example android-v0.2.0"
        required: true
        type: string
      release_name:
        description: "Human-readable release name"
        required: true
        type: string
      prerelease:
        description: "Publish as a prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: android-named-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  android-artifacts:
    name: Android Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Verify endpoint parity
        run: python3 ci/endpoint_parity.py

      - name: Test and build Android artifacts
        working-directory: android
        run: ./gradlew testDebugUnitTest assembleDebug bundleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v5
        with:
          name: hermex-android-artifacts
          if-no-files-found: error
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/release/app-release.aab

  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: android-artifacts
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v5
        with:
          name: hermex-android-artifacts
          path: dist

      - name: Create release notes
        run: |
          cat > release-notes.md <<'EOF'
          Hermex native Android release artifacts.

          This release was gated by:
          - iOS/Android endpoint parity
          - Android unit tests
          - debug APK and release AAB builds
          EOF

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          PRERELEASE_FLAG: ${{ inputs.prerelease && '--prerelease' || '' }}
        run: |
          set -euo pipefail
          mapfile -t release_assets < <(find dist -type f | sort)
          if [ "${#release_assets[@]}" -eq 0 ]; then
            echo "No release assets found in dist"
            exit 1
          fi
          gh release create "${{ inputs.tag_name }}" "${release_assets[@]}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "${{ inputs.release_name }}" \
            --notes-file release-notes.md \
            $PRERELEASE_FLAG
