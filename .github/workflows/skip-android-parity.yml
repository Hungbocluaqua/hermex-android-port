name: Skip Android Parity

on:
  workflow_dispatch:
    inputs:
      build_generated_apk:
        description: "Build and upload the generated Skip APK smoke artifact"
        required: false
        default: false
        type: boolean
  pull_request:
    paths:
      - Package.swift
      - Sources/**
      - Tests/**
      - android/**
      - ci/capture_skip_android_fixture.sh
      - ci/capture_skip_android_fixture_matrix.sh
      - ci/build_skip_android_app.sh
      - ci/visual-goldens/**
      - ci/prepare_skip_hermex_app.py
      - ci/skip-hermex-app/**
      - .github/workflows/android-visual-screens.yml
      - .github/workflows/android-visual-fixture-matrix.yml
      - .github/workflows/visual-golden-compare.yml
      - ci/endpoint_parity.py
      - ci/skip_migration_audit.py
      - ci/skip_migration_manifest.json
      - ci/skip_package_audit.py
      - ci/skip_release_readiness_audit.py
      - ci/shared_ui_parity_audit.py
      - docs/android-skip-port.md
      - .github/workflows/skip-android-parity.yml

permissions:
  contents: read

concurrency:
  group: skip-android-parity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  change-scope:
    name: Classify Changed Paths
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run_android: ${{ steps.scope.outputs.run_android }}
      run_visual: ${{ steps.scope.outputs.run_visual }}
    steps:
      - name: Check out
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          MERGE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            echo "run_android=true" >> "$GITHUB_OUTPUT"
            echo "run_visual=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "$BASE_SHA" "$MERGE_SHA")"
          echo "Changed files:"
          printf '%s\n' "$changed_files"

          if grep -qE '^android/' <<<"$changed_files"; then
            echo "run_android=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_android=false" >> "$GITHUB_OUTPUT"
          fi

          if grep -qE '^(Sources/HermexUI/|HermesMobile/Features/|HermesMobile/Resources/|ci/visual-goldens/|ci/capture_skip_android_fixture|\.github/workflows/(android-visual|visual-golden))' <<<"$changed_files"; then
            echo "run_visual=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_visual=false" >> "$GITHUB_OUTPUT"
          fi

  shared-swift-contracts:
    name: Shared Swift Contracts
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Strip Skip plugins for plain Swift package checks
        run: echo "SKIP_ZERO=1" >> "$GITHUB_ENV"

      - name: Show Xcode and Swift versions
        run: |
          set -euo pipefail
          xcodebuild -version
          swift --version

      - name: Build shared Swift package
        run: swift build

      - name: Test shared Swift package
        run: swift test

  android-compose-safety:
    name: Android Compose Safety Build
    needs: change-scope
    if: needs.change-scope.outputs.run_android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Unit test and assemble fallback Android app
        working-directory: android
        run: ./gradlew testDebugUnitTest assembleDebug

  skip-toolchain-check:
    name: Skip Toolchain Check
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Install Skip
        run: |
          set -euo pipefail
          brew tap skiptools/skip || true
          brew trust skiptools/skip
          brew install skip || brew upgrade skip

      - name: Run Skip checkup
        run: |
          set -euo pipefail
          if ! skip checkup; then
            cat /tmp/skip-checkup-*.txt 2>/dev/null || true
            echo "skip checkup reported a hosted-runner diagnostic issue; continuing to the actual Skip build/test gate."
          fi

      - name: Resolve Skip package dependencies
        run: swift package resolve

      - name: Build Skip-enabled shared package
        run: swift build --target HermexUI

      - name: Test shared package after Skip build
        run: SKIP_ZERO=1 swift test

      - name: Record current migration state
        run: |
          set -euo pipefail
          echo "Hermex shared Swift package is wired for Skip."
          echo "Android Visual Screens can capture one named Skip fixture screen from an emulator."

  skip-generated-apk-smoke:
    name: Skip Generated APK Smoke
    runs-on: macos-26
    timeout-minutes: 90
    if: github.event_name == 'workflow_dispatch' && inputs.build_generated_apk == true
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
      HERMEX_ALLOW_INCOMPLETE_SKIP_APK: "1"
      HERMEX_REUSE_SKIP_APP_WORKDIR: "1"
      SKIP_APP_WORKDIR: ${{ github.workspace }}/.build/hermex-skip-app
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Cache SwiftPM and generated Skip workspace
        uses: actions/cache@v4
        with:
          path: |
            .build/hermex-skip-app
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/org.swift.swiftpm
          key: skip-generated-apk-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved', 'ci/build_skip_android_app.sh', 'ci/prepare_skip_hermex_app.py', 'ci/skip-hermex-app/**') }}
          restore-keys: |
            skip-generated-apk-${{ runner.os }}-

      - name: Configure Gradle cache
        uses: gradle/actions/setup-gradle@v5

      - name: Install Skip
        run: |
          set -euo pipefail
          brew tap skiptools/skip || true
          brew trust skiptools/skip
          install_skip() {
            brew install skiptools/skip/skip || brew upgrade skiptools/skip/skip
          }
          for attempt in 1 2 3; do
            if install_skip; then
              exit 0
            fi
            echo "Skip install attempt $attempt failed; retrying after a short delay."
            sleep $((attempt * 20))
          done
          install_skip

      - name: Install Android SDK for Skip
        run: |
          set -euo pipefail
          if ! skip android sdk install; then
            cat /tmp/skip-install-*.txt 2>/dev/null || true
            exit 1
          fi

      - name: Build incomplete generated Skip APK for inspection
        run: |
          set -euo pipefail
          bash ci/build_skip_android_app.sh "$RUNNER_TEMP/hermex-skip-smoke"

      - name: Upload generated Skip APK smoke artifact
        uses: actions/upload-artifact@v5
        with:
          name: hermex-skip-generated-apk-smoke
          if-no-files-found: error
          path: |
            ${{ runner.temp }}/hermex-skip-smoke/*.apk
            ${{ runner.temp }}/hermex-skip-smoke/*.aab

  visual-golden-manifest:
    name: Visual Golden Harness
    needs: change-scope
    if: needs.change-scope.outputs.run_visual == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Validate manifest JSON
        run: python3 -m json.tool ci/visual-goldens/hermex-screens.json >/dev/null

      - name: Install visual comparison dependencies
        run: python3 -m pip install -r ci/visual-goldens/requirements.txt

      - name: Self-test visual comparison
        run: python3 ci/visual-goldens/compare_screenshots.py --self-test

      - name: Self-test screenshot inventory validation
        run: python3 ci/visual-goldens/validate_screenshot_inventory.py --self-test

      - name: Validate shared visual fixture catalog
        run: python3 ci/visual-goldens/validate_fixture_catalog.py

      - name: Self-test Android fixture capture wiring
        run: bash ci/capture_skip_android_fixture.sh --self-test --screen session-list --state dark --device-name compact-phone

  parity-audits:
    name: Parity Audits
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Run parity audits
        run: |
          set -euo pipefail
          python3 ci/endpoint_parity.py
          python3 ci/skip_migration_audit.py
          python3 ci/skip_package_audit.py
          python3 ci/shared_ui_parity_audit.py
