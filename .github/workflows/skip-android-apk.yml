name: Skip Android APK Build

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "Android app versionName/version used by Skip"
        required: true
        default: "0.3.1"
        type: string
      artifact_name:
        description: "Artifact name for the generated Skip/SwiftUI APK"
        required: true
        default: "hermex-skip-swiftui-release-apk"
        type: string

permissions:
  contents: read

concurrency:
  group: skip-android-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  skip-release-apk:
    name: Build Signed Skip Android APK
    runs-on: macos-26
    timeout-minutes: 90
    env:
      HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
      HERMEX_ALLOW_INCOMPLETE_SKIP_APK: "1"
      HERMEX_SKIP_ANDROID_VARIANT: "release"
      HERMEX_SKIP_VERSION: ${{ inputs.app_version }}
      HERMEX_ANDROID_KEYSTORE_PASSWORD: "hermex-skip-ci-release-pass"
      HERMEX_ANDROID_KEY_ALIAS: "hermex-skip-ci-release"
      HERMEX_ANDROID_KEY_PASSWORD: "hermex-skip-ci-release-pass"
    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Install Skip
        run: |
          set -euo pipefail
          brew tap skiptools/skip || true
          brew trust skiptools/skip
          install_skip() {
            brew install skiptools/skip/skip || brew upgrade skiptools/skip/skip
          }
          for attempt in 1 2 3; do
            if install_skip; then
              exit 0
            fi
            echo "Skip install attempt $attempt failed; retrying after a short delay."
            sleep $((attempt * 20))
          done
          install_skip

      - name: Install Android SDK for Skip
        run: |
          set -euo pipefail
          if ! skip android sdk install; then
            cat /tmp/skip-install-*.txt 2>/dev/null || true
            exit 1
          fi
          echo "ANDROID_HOME=$HOME/Library/Android/sdk" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$HOME/Library/Android/sdk" >> "$GITHUB_ENV"
          echo "$HOME/Library/Android/sdk/platform-tools" >> "$GITHUB_PATH"
          echo "$HOME/Library/Android/sdk/build-tools/$(ls -1 "$HOME/Library/Android/sdk/build-tools" | sort | tail -n 1)" >> "$GITHUB_PATH"

      - name: Create CI release-candidate signing key
        run: |
          set -euo pipefail
          keytool -genkeypair \
            -v \
            -keystore "$RUNNER_TEMP/hermex-skip-release.jks" \
            -storepass "$HERMEX_ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$HERMEX_ANDROID_KEY_PASSWORD" \
            -alias "$HERMEX_ANDROID_KEY_ALIAS" \
            -keyalg RSA \
            -keysize 4096 \
            -validity 10000 \
            -dname "CN=Hermex Skip CI Release,O=Hermex,C=US"
          echo "HERMEX_ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/hermex-skip-release.jks" >> "$GITHUB_ENV"

      - name: Build signed Skip release APK
        run: |
          set -euo pipefail
          bash ci/build_skip_android_app.sh "$RUNNER_TEMP/hermex-skip-release"

      - name: Collect APK
        run: |
          set -euo pipefail
          mkdir -p dist
          apk="$(find "$RUNNER_TEMP/hermex-skip-release" -type f -name '*.apk' | sort | head -n 1)"
          if [ -z "$apk" ]; then
            echo "No Skip release APK was produced."
            exit 1
          fi
          cp "$apk" "dist/Hermex-skip-swiftui-android-${{ inputs.app_version }}-release.apk"
          shasum -a 256 dist/Hermex-skip-swiftui-android-${{ inputs.app_version }}-release.apk \
            > dist/Hermex-skip-swiftui-android-${{ inputs.app_version }}-release.apk.sha256
          apksigner verify --verbose --print-certs dist/Hermex-skip-swiftui-android-${{ inputs.app_version }}-release.apk
          ls -la dist

      - name: Upload Skip/SwiftUI APK
        uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.artifact_name }}
          if-no-files-found: error
          path: dist/*
