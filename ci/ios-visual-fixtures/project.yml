name: HermexVisualFixtures

options:
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

packages:
  HermexShared:
    path: ../..

targets:
  HermexVisualFixtures:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App
    dependencies:
      - package: HermexShared
        product: HermexUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.uzairansar.hermesmobile.visualfixtures
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
